<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neubrutalismo UI</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- DECORACIÓN -->
  <img src="assets/estrella.svg" class="star star-1">
  <img src="assets/estrella.svg" class="star star-2">
  <img src="assets/planeta.svg" class="planet">

  <!-- HERO -->
  <header class="hero">
    <h1>Neubrutalismo interactivo</h1>
    <p>Quiz + Cards + Acordeón</p>
  </header>

  <main class="container">

    <!-- QUIZ -->
    <section class="section">

      <div id="quizIntro">
        <button id="startQuizBtn" class="btn">
          <img src="assets/play.svg"> Empezar quiz
        </button>
      </div>

      <div id="quizBox" class="hidden">
        <h2 id="question"></h2>
        <div id="answers"></div>

        <p id="error" class="hidden">
          <img src="assets/rayo.svg"> Elegí una opción
        </p>

        <div class="actions">
          <button id="prevBtn" class="btn small hidden">Anterior</button>
          <button id="nextBtn" class="btn">
            Siguiente <img src="assets/flecha.svg">
          </button>
        </div>
      </div>

    </section>

    <!-- CARDS -->
    <section class="cards">

      <div class="card">
        <img src="assets/blob.svg" class="blob">
        <h3>Branding</h3>
        <p>Identidad visual potente</p>
      </div>

      <div class="card">
        <img src="assets/blob.svg" class="blob">
        <h3>UI Design</h3>
        <p>Interfaces con personalidad</p>
      </div>

      <div class="card">
        <img src="assets/blob.svg" class="blob">
        <h3>Creative</h3>
        <p>Conceptos visuales</p>
      </div>

    </section>

    <!-- ACORDEÓN -->
    <section class="accordion">

      <div class="item active">
        <button>Concepto</button>
        <div class="content">Diseño con impacto visual fuerte</div>
      </div>

      <div class="item">
        <button>Paleta</button>
        <div class="content">Colores vibrantes y contraste</div>
      </div>

      <div class="item">
        <button>Uso</button>
        <div class="content">Webs creativas y modernas</div>
      </div>

    </section>

  </main>

  <!-- MODAL -->
  <div id="modal" class="hidden">
    <div class="overlay"></div>
    <div class="modal-box">
      <h2 id="resultTitle"></h2>
      <p id="resultText"></p>
      <button id="restartBtn" class="btn">Reiniciar</button>
    </div>
  </div>

<script src="app.js"></script>
</body>
</html>
